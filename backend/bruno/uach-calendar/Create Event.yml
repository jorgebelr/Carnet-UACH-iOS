info:
  name: Create Event
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/events
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "title": "Security Conference",
        "category": "ScientificPhilosophical",
        "description": "Evento sobre Seguridad de la informacion",
        "date": "2026-04-01T18:00:00.000Z",
        "maxCapacity": 50
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
